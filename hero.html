<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bai ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
    height:110vh;
    overflow:hidden;
    background-image:url("Images/Me.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Dark Overlay */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
}

/* Floating Hearts */

.heart{

position:absolute;
color:#ffb6c1;
font-size:24px;
animation:float 10s linear infinite;
opacity:.8;

}

@keyframes float{

0%{
transform:translateY(110vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Content */

.container{

position:relative;
z-index:10;
text-align:center;
color:white;
animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.date{

letter-spacing:6px;
font-size:20px;
margin-bottom:20px;
opacity:.9;

}

h1{

font-family:"Dancing Script",cursive;

font-size:80px;

margin-bottom:20px;

text-shadow:0 5px 20px rgba(0,0,0,.5);

}

.message{

max-width:700px;

font-size:20px;

line-height:35px;

margin:auto;

margin-bottom:40px;

}

.btn{

padding:16px 45px;

font-size:18px;

border:none;

border-radius:50px;

background:white;

color:#8B0000;

cursor:pointer;

transition:.4s;

font-weight:bold;

box-shadow:0 10px 25px rgba(0,0,0,.3);

}

.btn:hover{

transform:scale(1.08);

background:#ffdede;

}

@media(max-width:768px){

h1{

font-size:52px;

}

.message{

padding:0 20px;
font-size:17px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="date">
15 • 07 • 2005
</div>

<h1>
Happy Birthday Bai! 🎉
</h1>

<div class="message">

Every moment with you is special. ❤️<br>

May your birthday bring endless happiness, beautiful memories, good health, success and all the love you deserve.

Have the most amazing day, Bai! 🎂💖

</div>

<button class="btn" onclick="nextPage()">

📖 Read Your Letter

</button>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(6+Math.random()*8)+"s";

heart.style.animationDelay=Math.random()*5+"s";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

}

/* Next Page */

function nextPage(){

window.location="letter.html";

}

</script>

</body>
</html>
