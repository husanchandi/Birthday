<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#8B1E2D;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
color:white;
}

h1{
font-family:'Dancing Script',cursive;
font-size:60px;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:40px;
}

/* Gift Box */

.gift{
width:180px;
height:180px;
margin:auto;
cursor:pointer;
position:relative;
transition:.5s;
}

.box{
width:180px;
height:120px;
background:#ff4d6d;
position:absolute;
bottom:0;
border-radius:8px;
}

.lid{
width:200px;
height:45px;
background:#ff758f;
position:absolute;
top:15px;
left:-10px;
border-radius:8px;
transition:.8s;
transform-origin:left;
}

.ribbonV{
width:20px;
height:180px;
background:#ffd60a;
position:absolute;
left:80px;
}

.ribbonH{
width:180px;
height:20px;
background:#ffd60a;
position:absolute;
top:70px;
}

.message{
display:none;
margin-top:40px;
font-size:22px;
max-width:700px;
line-height:40px;
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:18px;
background:white;
color:#8B1E2D;
cursor:pointer;
display:none;
}

button:hover{
background:#ffe6ea;
}

</style>
</head>

<body>

<div class="container">

<h1>A Small Surprise 🎁</h1>

<p>Click the Gift Box</p>

<div class="gift" onclick="openGift()">

<div class="lid" id="lid"></div>

<div class="box"></div>

<div class="ribbonV"></div>

<div class="ribbonH"></div>

</div>

<div class="message" id="msg">

💖 Dear Moti 😅💖,<br><br>

You are my biggest blessing and my best friend.
May every dream come true and every day bring you happiness.

Thank you for always standing by my side.

🎂 Happy Birthday! 🎂

</div>

<button id="next" onclick="location.href='cake.html'">

Next Surprise →

</button>

</div>

<script>

function openGift(){

document.getElementById("lid").style.transform="rotate(-130deg)";

document.getElementById("msg").style.display="block";

document.getElementById("next").style.display="inline-block";

}

</script>

</body>
</html>
