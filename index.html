<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#7b0f18,#b33939);

overflow:hidden;

}

/* Floating Background */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.08) 2px,transparent 3px),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.08) 2px,transparent 3px);
animation:move 18s linear infinite;
opacity:.5;
}

@keyframes move{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-200px);
}

}

/* Container */

.container{

width:1150px;
height:650px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(12px);

border-radius:25px;

display:flex;

box-shadow:0 20px 50px rgba(0,0,0,.35);

z-index:10;

}

/* LEFT */

.left{

width:50%;

display:flex;

justify-content:center;

align-items:center;

}

/* Polaroid */

.polaroid{

background:white;

padding:15px 15px 40px;

transform:rotate(-5deg);

box-shadow:0 15px 35px rgba(0,0,0,.3);

position:relative;

transition:.4s;

}

.polaroid:hover{

transform:rotate(0deg) scale(1.03);

}

.polaroid img{

width:320px;

height:420px;

object-fit:cover;

}

.polaroid h2{

font-family:'Dancing Script',cursive;

margin-top:15px;

text-align:center;

color:#8b1e2d;

}

/* Ribbon */

.ribbon{

position:absolute;

top:-10px;

left:-10px;

font-size:45px;

}

/* RIGHT */

.right{

width:50%;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

color:white;

}

.lock{

font-size:40px;

margin-bottom:15px;

}

.title{

letter-spacing:2px;

font-size:15px;

margin-bottom:20px;

opacity:.9;

}

.dots{

display:flex;

gap:12px;

margin-bottom:35px;

}

.dot{

width:18px;

height:18px;

border-radius:50%;

border:2px solid rgba(255,255,255,.7);

transition:.3s;

}

.fill{

background:white;

}

/* keypad */

.keypad{

display:grid;

grid-template-columns:repeat(3,90px);

gap:18px;

}

.key{

width:80px;

height:80px;

border-radius:50%;

border:none;

background:rgba(255,255,255,.15);

color:white;

font-size:28px;

cursor:pointer;

backdrop-filter:blur(10px);

transition:.25s;

box-shadow:0 8px 18px rgba(0,0,0,.2);

}

.key:hover{

background:white;

color:#8b1e2d;

transform:scale(1.08);

}

#msg{

margin-top:25px;

height:25px;

font-size:17px;

color:#ffd7d7;

font-weight:500;

}

/* Mobile */

@media(max-width:900px){

.container{

width:95%;
height:auto;
flex-direction:column;
padding:30px;

}

.left,.right{

width:100%;

}

.polaroid img{

width:240px;
height:320px;

}

.keypad{

grid-template-columns:repeat(3,75px);

}

.key{

width:70px;
height:70px;

}

}

</style>

</head>
<body>

<div class="container">

<div class="left">

<div class="polaroid">

<div class="ribbon">🎀</div>

<img src="Images/Sister.JPG">

<h2>Happy Birthday<br>My Lovely Sister ❤️</h2>

</div>

</div>

<div class="right">

<div class="lock">🔒</div>

<div class="title">
ENTER YOUR PASSCODE
</div>

<div class="dots">

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

</div>

<div class="keypad">

<button class="key" onclick="press('1')">1</button>
<button class="key" onclick="press('2')">2</button>
<button class="key" onclick="press('3')">3</button>

<button class="key" onclick="press('4')">4</button>
<button class="key" onclick="press('5')">5</button>
<button class="key" onclick="press('6')">6</button>

<button class="key" onclick="press('7')">7</button>
<button class="key" onclick="press('8')">8</button>
<button class="key" onclick="press('9')">9</button>

<button class="key" onclick="clearPass()">⌫</button>
<button class="key" onclick="press('0')">0</button>
<button class="key" onclick="check()">✔</button>

</div>

<div id="msg"></div>

</div>

</div>

<script>

let password="";

const correctPassword="152005";

const dots=document.querySelectorAll(".dot");

function press(num){

if(password.length<6){

password+=num;

updateDots();

}

}

function updateDots(){

dots.forEach((d,i)=>{

d.classList.toggle("fill",i<password.length);

});

}

function clearPass(){

password=password.slice(0,-1);

updateDots();

}

function check(){

if(password===correctPassword){

document.getElementById("msg").style.color="#9CFF9C";

document.getElementById("msg").innerHTML="❤️ Access Granted ❤️";

setTimeout(()=>{

window.location.href="date.html";

},1200);

}

else{

document.getElementById("msg").style.color="#FFD1D1";

document.getElementById("msg").innerHTML="❌ Wrong Passcode";

password="";

updateDots();

}

}

</script>

</body>
</html>
